<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Video-to-Text Transcriber</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">

  <style>
    :root { --fg:#222; --muted:#666; --brand:#2563eb; --ok:#16a34a; --bg:#fff; --card:#f8f9fb; }
    * { box-sizing: border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC","Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--fg); }
    .wrap { max-width: 820px; margin: 32px auto; padding: 0 16px; }
    h1 { font-size: 28px; font-weight: 700; display:flex; gap:10px; align-items:center; }
    h1::before { content:"🎧"; font-size: 28px; }
    label { display:block; margin: 14px 0 6px; font-weight: 600; }
    input[type="file"], select { padding:6px 8px; font-size:14px; }
    button { margin-top:14px; padding:8px 14px; border:1px solid #ddd; background:#fff; border-radius:6px; cursor:pointer; }
    button:hover { border-color:#ccc; }
    .row { margin: 10px 0 18px; }
    .muted { color: var(--muted); font-size: 13px; }
    .ok { color: var(--ok); }
    .links a { display:inline-block; margin-right:12px; }
    .card { background: var(--card); border: 1px solid #eee; border-radius: 10px; padding: 12px; }

    .progress-wrap { margin-top: 14px; display: none; }
    .progress-label { font-size: 14px; margin-bottom: 6px; }
    progress { width: 100%; height: 10px; }

    #result { display:none; margin-top: 12px; }
    #preview { width: 100%; height: 300px; white-space: pre-wrap; overflow: auto; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Video-to-Text Transcriber</h1>

    <form id="form">
      <div class="row">
        <label>Choose media file:</label>
        <input id="media" type="file" accept=".mp4,.mov,.mp3,.wav,video/*,audio/*" required />
      </div>

      <div class="row">
        <label>Language:</label>
        <select id="lang">
          <option value="auto">Auto detect</option>
          <option value="en">English</option>
          <option value="zh">Chinese</option>
        </select>
      </div>

      <div class="row">
        <label>Model size:</label>
        <select id="model">
          <option value="large-v2">large-v2 (best quality, slower)</option>
          <option value="medium">medium (faster, good)</option>
        </select>
      </div>

      <button id="btn" type="submit">Transcribe</button>

      <!-- 上传进度（仅上传时显示） -->
      <div id="uploadBox" class="progress-wrap">
        <div id="uploadText" class="progress-label muted">uploading…</div>
        <progress id="uploadBar" value="0" max="100"></progress>
      </div>

      <!-- 转写进度（仅转写时显示） -->
      <div id="transBox" class="progress-wrap">
        <div id="transText" class="progress-label muted">transcribing…</div>
        <progress id="transBar" value="0" max="100"></progress>
      </div>
    </form>

    <!-- 结果 -->
    <div id="result">
      <p class="ok">✅ Transcription done.</p>
      <div class="links">
        <a id="linkTxt" href="#" download>⬇ Download TXT</a>
        <a id="linkSrt" href="#" download>⬇ Download SRT</a>
        <a id="linkVtt" href="#" download>⬇ Download VTT</a>
      </div>

      <div class="card">
        <pre id="preview"></pre>
      </div>
    </div>
  </div>

  <script>
    // 工具：格式化 ETA 秒
    function formatETA(sec) {
      if (sec == null || !isFinite(sec)) return '--';
      sec = Math.max(0, Math.floor(sec));
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${h}h ${m}m ${s}s`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    // 上传：更稳的 ETA（滑动平均 5 秒）
    function uploadWithProgress(url, formData, onProgress) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", url, true);

        const samples = []; // [{t, loaded}]
        const WINDOW = 5000; // 5s

        xhr.upload.onprogress = (e) => {
          if (!e.lengthComputable) return;
          const now = performance.now();
          samples.push({ t: now, loaded: e.loaded });
          while (samples.length && (now - samples[0].t) > WINDOW) samples.shift();

          let bps = 0;
          if (samples.length >= 2) {
            const first = samples[0];
            const last = samples[samples.length - 1];
            const dBytes = last.loaded - first.loaded;
            const dTime = (last.t - first.t) / 1000;
            if (dTime > 0) bps = dBytes / dTime;
          }
          const remaining = e.total - e.loaded;
          const eta = bps > 0 ? remaining / bps : null;
          onProgress({ percent: e.loaded / e.total, eta });
        };

        xhr.onreadystatechange = () => {
          if (xhr.readyState === 4) {
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve(JSON.parse(xhr.responseText));
            } else {
              reject(new Error(`HTTP ${xhr.status}`));
            }
          }
        };

        xhr.send(formData);
      });
    }

    // 轮询后端进度
    let pollTimer = null;
    async function pollProgress(jobId, onUpdate, onDone) {
      clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/progress/${jobId}`);
          const data = await res.json(); // {phase,pct,eta,download_ready}
          onUpdate(data);
          if (data.phase === 'done' || data.phase === 'error') {
            clearInterval(pollTimer);
            onDone?.(data);
          }
        } catch (e) { /* 忽略暂时错误 */ }
      }, 800);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('form');
      const fileInput = document.getElementById('media');
      const langSel = document.getElementById('lang');
      const modelSel = document.getElementById('model');

      const uploadBox = document.getElementById('uploadBox');
      const uploadBar = document.getElementById('uploadBar');
      const uploadText = document.getElementById('uploadText');

      const transBox = document.getElementById('transBox');
      const transBar = document.getElementById('transBar');
      const transText = document.getElementById('transText');

      const resultBox = document.getElementById('result');
      const linkTxt = document.getElementById('linkTxt');
      const linkSrt = document.getElementById('linkSrt');
      const linkVtt = document.getElementById('linkVtt');
      const preview = document.getElementById('preview');

      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const f = fileInput.files[0];
        if (!f) return;

        // 重置 UI
        resultBox.style.display = 'none';
        uploadBox.style.display = 'block';
        transBox.style.display = 'none';
        uploadBar.value = 0;
        uploadText.textContent = 'uploading… 0% | ETA: --';
        transBar.value = 0;

        const fd = new FormData();
        fd.append('media', f);
        fd.append('language', langSel.value);
        fd.append('model_size', modelSel.value);

        try {
          // 1) 上传 + 实时 ETA
          const initResp = await uploadWithProgress('/api/transcribe', fd, ({percent, eta}) => {
            uploadBar.value = Math.floor(percent * 100);
            uploadText.textContent = `uploading… ${Math.floor(percent * 100)}% | ETA: ${formatETA(eta)}`;
          });

          // 上传完成 -> 隐藏上传条，展示转写条并轮询进度
          uploadBox.style.display = 'none';
          transBox.style.display = 'block';
          transText.textContent = `transcribing… 0% | ETA: --`;

          // 2) 轮询进度
          pollProgress(initResp.job_id, (p) => {
            if (p.phase === 'transcribing') {
              const pct = Math.floor((p.pct || 0) * 100);
              transBar.value = pct;
              transText.textContent = `transcribing… ${pct}% | ETA: ${formatETA(p.eta)}`;
            } else if (p.phase === 'queued') {
              transText.textContent = `queued…`;
            } else if (p.phase === 'done') {
              transBar.value = 100;
              transText.textContent = 'done | ETA: 0s';
            } else if (p.phase === 'error') {
              transText.textContent = `error: ${p.message || 'unknown'}`;
            }
          }, async (final) => {
            // 3) 完成 -> 展示结果与下载
            if (final.phase === 'done') {
              resultBox.style.display = 'block';
              linkTxt.href = initResp.text_url;
              linkSrt.href = initResp.srt_url;
              linkVtt.href = initResp.vtt_url;
              linkTxt.setAttribute("download", "transcript.txt");
              linkSrt.setAttribute("download", "subtitles.srt");
              linkVtt.setAttribute("download", "subtitles.vtt");
              try {
                const t = await (await fetch(initResp.text_url)).text();
                preview.textContent = t;
              } catch {
                preview.textContent = '(Preview unavailable, but files are ready to download.)';
              }
            }
          });

        } catch (err) {
          uploadText.textContent = 'failed';
          console.error(err);
        }
      });
    });
  </script>
</body>
</html>
